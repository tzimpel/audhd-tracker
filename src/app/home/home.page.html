<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      AuDHD Tracker
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">AuDHD Tracker</ion-title>
    </ion-toolbar>
  </ion-header>

  <div id="container" *ngIf="summary as vm">
    <p class="eyebrow">Home summary</p>
    <strong>{{ vm.title }}</strong>
    <p>{{ vm.message }}</p>
    <p class="meta">Check-ins saved: {{ vm.checkInCount }}</p>
    <p class="meta">Warning signs saved: {{ vm.warningSignCount }}</p>
    <p class="meta" *ngIf="vm.latestCheckInDateKey">Latest check-in: {{ vm.latestCheckInDateKey }}</p>
  </div>
</ion-content>
